name: classroom-attendance

services:
  attendance-web:
    image: classroom-attendance:latest
    container_name: attendance
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_PATH: ${DATABASE_PATH:-/data/attendance.sqlite}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ${DATA_MOUNT:-attendance-data}:/data
    restart: unless-stopped

volumes:
  attendance-data:
